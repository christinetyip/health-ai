</head>
<body>
<div class="app">
    <header>
        <div class="date-stamp" id="date-stamp">Loading...</div>
        <svg class="profile-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </header>
    <div class="ptr-indicator" id="ptr">Pull to refresh</div>
    <div id="content"><div class="loading"><div class="loading-orb"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>Reading your signals<span class="loading-dots"></span></div></div>
</div>

<nav class="bottom-nav">
    <a class="nav-item active"><div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></div><div class="nav-label">Today</div></a>
    <a class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 9l-5 5-4-4-5 5"/></svg></div><div class="nav-label">Trends</div></a>
    <a class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><div class="nav-label">Insights</div></a>
    <a class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div class="nav-label">Settings</div></a>
</nav>

<script>
const SVG_ICONS = {
    moon: '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>',
    face: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9h.01M15 9h.01"/><path d="M18 12a6 6 0 0 1-12 0"/></svg>',
    bolt: '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',
    sun: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>',
    people: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    compass: '<svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>',
};

async function loadDashboard() {
    try {
        const resp = await fetch('/api/dashboard');
        const d = await resp.json();
        render(d);
    } catch(e) {
        document.getElementById('content').innerHTML = `<div class="loading">
            <div style="font-family:var(--font-serif);font-size:1.1rem;font-style:italic;margin-bottom:8px">Could not load data</div>
            <div style="font-size:.75rem;color:var(--thread-faded);line-height:1.6">This can take 20-30 seconds on first load while the AI generates coaching text. If it persists, check that the server is running.<br><small>${e.message}</small></div>
        </div>`;
    }
}

function sparkSVG(values) {
    if (!values || values.length < 2) return '<svg viewBox="0 0 100 20"><line x1="0" y1="10" x2="100" y2="10" class="spark-line" opacity="0.3"/></svg>';
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const points = values.map((v, i) => {
        const x = (i / (values.length - 1)) * 100;
        const y = 18 - ((v - min) / range) * 16;
        return `${x},${y}`;
    }).join(' ');
    return `<svg viewBox="0 0 100 20"><polyline class="spark-line" points="${points}"/></svg>`;
}

function buildTrendRows(d) {
    const sh = (d.sleep_history || {}).sessions || [];
    const dh = (d.daily_history || {}).days || [];
    const radar = d.radar || [];

    // Build trend data arrays
    const sleepHours = sh.map(s => s.total_hours || 0);
    const deepPcts = sh.map(s => {
        const total = (s.deep_sleep_hours||0) + (s.light_sleep_hours||0) + (s.rem_sleep_hours||0);
        return total > 0 ? Math.round((s.deep_sleep_hours||0) / total * 100) : 0;
    });
    const energyVals = radar.map(r => r.energy || 0).reverse();
    const stressVals = dh.map(d => d.stress_avg).filter(v => v != null);

    // Calculate deltas
    function delta(arr, unit, invert) {
        if (arr.length < 2) return '<span class="trend-delta" style="color:var(--thread-faded)">—</span>';
        const first = arr[0], last = arr[arr.length - 1];
        const diff = last - first;
        const pct = first ? Math.round(Math.abs(diff) / first * 100) : 0;
        const up = invert ? diff < 0 : diff > 0;
        const cls = diff === 0 ? '' : (up ? 't-up' : 't-down');
        const arrow = diff === 0 ? '→' : (up ? '▲' : '▼');
        return `<span class="trend-delta ${cls}">${last}${unit} ${arrow}${pct}%</span>`;
    }

    const rows = [];

    if (sleepHours.length > 0) {
        rows.push(`<div class="trend-row"><div class="trend-name">Avg sleep</div><div class="trend-spark">${sparkSVG(sleepHours)}</div>${delta(sleepHours, 'h', false)}</div>`);
    }
    if (energyVals.length > 0) {
        rows.push(`<div class="trend-row"><div class="trend-name">Energy</div><div class="trend-spark">${sparkSVG(energyVals)}</div>${delta(energyVals, '/5', false)}</div>`);
    }
    if (deepPcts.length > 0) {
        rows.push(`<div class="trend-row"><div class="trend-name">Deep sleep</div><div class="trend-spark">${sparkSVG(deepPcts)}</div>${delta(deepPcts, '%', false)}</div>`);
    }
    if (stressVals.length > 0) {
        rows.push(`<div class="trend-row"><div class="trend-name">Stress</div><div class="trend-spark">${sparkSVG(stressVals)}</div>${delta(stressVals, '', true)}</div>`);
    }

    // Steps from daily history
    const stepVals = dh.map(d => d.steps || 0);
    if (stepVals.length > 0) {
        rows.push(`<div class="trend-row"><div class="trend-name">Steps</div><div class="trend-spark">${sparkSVG(stepVals)}</div>${delta(stepVals, '', false)}</div>`);
    }

    // Mental energy (same as energy from check-ins but labeled differently)
    if (energyVals.length > 1) {
        rows.push(`<div class="trend-row"><div class="trend-name">Mental energy</div><div class="trend-spark">${sparkSVG(energyVals)}</div>${delta(energyVals, '/5', false)}</div>`);
    }

    // Clarity (% of check-ins with named feelings)
    const clarityVals = [];
    for (let i = 0; i < Math.min(radar.length, 7); i++) {
        const r = radar[i];
        if (r && r.feeling && r.feeling !== '?' && r.feeling !== '—') clarityVals.push(1);
        else if (r) clarityVals.push(0);
    }
    if (clarityVals.length > 1) {
        const clarityPcts = [];
        let running = 0;
        clarityVals.reverse().forEach((v, i) => {
            running += v;
            clarityPcts.push(Math.round(running / (i + 1) * 100));
        });
        rows.push(`<div class="trend-row"><div class="trend-name">Clarity</div><div class="trend-spark">${sparkSVG(clarityPcts)}</div><span class="trend-delta" style="color:var(--thread-faded)">${clarityPcts[clarityPcts.length-1]}%</span></div>`);
    }

    if (rows.length === 0) {
        rows.push('<div style="font-size:.75rem;color:var(--thread-faded);font-style:italic">Need more data to show trends. Keep wearing the band and checking in.</div>');
    }

    return rows.join('');
}

function buildSleepTrend(sessions) {
    if (!sessions || sessions.length === 0) {
        return '<div style="font-size:.75rem;color:var(--thread-faded);font-style:italic;padding:20px 0">No sleep data yet. Wear the band tonight.</div>';
    }

    // Separate night sleep from naps — use is_nap flag from API, or fallback to heuristic
    const naps = [];
    const nights = sessions.filter(s => {
        const isNap = s.is_nap !== undefined ? s.is_nap : (() => {
            const totalH = (s.deep_sleep_hours||0) + (s.light_sleep_hours||0) + (s.rem_sleep_hours||0);
            const bedHour = s.date ? parseInt(s.date.split(' ')[1].split(':')[0]) : 0;
            return totalH < 2 || (bedHour >= 10 && bedHour < 20);
        })();
        if (isNap) naps.push(s);
        return !isNap;
    });
    sessions = nights;

    // Time axis: 21:00 (top) to 10:00 next day (bottom) = 13 hours
    const axisStart = 21; // 21:00
    const axisSpan = 13;  // hours
    const chartH = 180;   // px

    function timeToY(timeStr) {
        // timeStr like "2026-03-28 01:02"
        if (!timeStr) return 50;
        const parts = timeStr.split(' ')[1];
        if (!parts) return 50;
        const [h, m] = parts.split(':').map(Number);
        let hoursFrom21 = (h - axisStart + 24) % 24;
        hoursFrom21 += m / 60;
        return (hoursFrom21 / axisSpan) * 100;
    }

    // Y-axis time labels
    const ticks = [21, 23, 1, 3, 5, 7, 9];
    const ticksHTML = ticks.map(h => {
        const pct = ((h - axisStart + 24) % 24) / axisSpan * 100;
        const label = h < 10 ? `0${h}:00` : `${h}:00`;
        return `<div class="sleep-timeline-tick" style="position:absolute;top:${pct}%">${label}</div>`;
    }).join('');

    // Grid lines
    const gridHTML = [23, 1, 3, 5, 7].map(h => {
        const pct = ((h - axisStart + 24) % 24) / axisSpan * 100;
        return `<div class="sleep-timeline-grid" style="top:${pct}%"></div>`;
    }).join('');

    // Build columns
    const colsHTML = sessions.map((sess, i) => {
        const bedY = timeToY(sess.date);
        const wakeY = timeToY(sess.wakeup_time);
        const barHeight = wakeY - bedY;

        if (barHeight <= 0) return ''; // invalid data

        const total = (sess.deep_sleep_hours||0) + (sess.light_sleep_hours||0) + (sess.rem_sleep_hours||0);
        const deepPct = total > 0 ? (sess.deep_sleep_hours||0) / total * 100 : 33;
        const lightPct = total > 0 ? (sess.light_sleep_hours||0) / total * 100 : 34;
        const remPct = total > 0 ? (sess.rem_sleep_hours||0) / total * 100 : 33;

        // Label by wake-up morning (not bedtime) — "last night's sleep" belongs to today
        const wakeDt = sess.wakeup_time ? new Date(sess.wakeup_time) : null;
        const dayLabel = wakeDt ? wakeDt.toLocaleDateString('en', {weekday: 'short'}) : '?';
        const dateLabel = wakeDt ? `${wakeDt.getDate()}/${wakeDt.getMonth()+1}` : '';
        const isToday = i === sessions.length - 1;

        const bedTime = sess.date ? sess.date.split(' ')[1] : '';
        const wakeTime = sess.wakeup_time ? sess.wakeup_time.split(' ')[1] : '';

        return `<div class="sleep-col">
            <div class="sleep-col-bar" style="top:${bedY}%;height:${barHeight}%">
                <div style="flex:${deepPct};background:var(--color-deep)"></div>
                <div style="flex:${lightPct};background:var(--color-light)"></div>
                <div style="flex:${remPct};background:var(--color-rem)"></div>
            </div>
            <div class="sleep-col-time sleep-col-time-bed" style="top:calc(${bedY}% - 12px)">${bedTime}</div>
            <div class="sleep-col-time sleep-col-time-wake" style="top:calc(${wakeY}% + 2px)">${wakeTime}</div>
            <div class="sleep-col-label ${isToday ? 'sleep-col-label-today' : ''}">${dayLabel}<br>${dateLabel}</div>
        </div>`;
    }).join('');

    // Bedtime consistency
    const bedtimes = sessions.map(s => {
        if (!s.date) return null;
        const [h, m] = s.date.split(' ')[1].split(':').map(Number);
        return ((h - axisStart + 24) % 24) * 60 + m; // minutes from 21:00
        }).filter(v => v !== null);
    let consistency = '';
    if (bedtimes.length > 1) {
        const avg = bedtimes.reduce((a,b) => a+b, 0) / bedtimes.length;
        const variance = Math.round(Math.sqrt(bedtimes.reduce((a,b) => a + (b-avg)**2, 0) / bedtimes.length));
        consistency = `Bedtime varies by ~${variance} min`;
    }

    const napNote = naps.length > 0 ? naps.map(n => {
        const napDt = n.date ? new Date(n.date) : null;
        const napDay = napDt ? napDt.toLocaleDateString('en', {weekday: 'short'}) : '?';
        const t = n.date ? n.date.split(' ')[1] : '?';
        const wakeT = n.wakeup_time ? n.wakeup_time.split(' ')[1] : '?';
        const dur = n.total_hours || Math.round(((n.deep_sleep_hours||0)+(n.light_sleep_hours||0)+(n.rem_sleep_hours||0))*10)/10;
        return `${napDay}: ${dur}h nap (${t}\u2013${wakeT})`;
    }).join(' &middot; ') : '';

    const footerLines = [];
    if (consistency) footerLines.push(consistency);
    if (naps.length > 0) {
        naps.forEach(n => {
            const napDt = n.date ? new Date(n.date) : null;
            const napDay = napDt ? napDt.toLocaleDateString('en', {weekday: 'short'}) : '?';
            const t = n.date ? n.date.split(' ')[1] : '?';
            const wakeT = n.wakeup_time ? n.wakeup_time.split(' ')[1] : '?';
            const dur = n.total_hours || Math.round(((n.deep_sleep_hours||0)+(n.light_sleep_hours||0)+(n.rem_sleep_hours||0))*10)/10;
            footerLines.push(`${napDay}: ${dur}h nap (${t}\u2013${wakeT})`);
        });
    }

    return `<div class="sleep-timeline">
        <div class="sleep-timeline-axis">${ticksHTML}</div>
        ${gridHTML}
        ${colsHTML}
    </div>
    <div style="font-size:.68rem;color:var(--thread-faded);margin-top:22px;line-height:1.8">${footerLines.join('<br>')}</div>`;
}

function buildStressChart(stressData) {
    const samples = (stressData || {}).samples || [];
    if (samples.length < 2) {
        return `<div class="stress-chart">
            <div class="sz sz-high"></div><div class="sz sz-mod"></div><div class="sz sz-low"></div>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3">
                <div style="font-family:var(--font-serif);font-size:1rem;font-style:italic;color:var(--thread-faded);margin-bottom:4px">Waiting for stress data</div>
                <div style="font-size:.65rem;color:var(--thread-faded)">Open Gadgetbridge and tap "Fetch activity data" to sync</div>
            </div>
        </div>`;
    }
    // Map stress values (0-100) to SVG y coordinates (0=top=high stress, 90=bottom=low stress)
    const w = 400, h = 90;
    const points = samples.map((s, i) => {
        const x = (i / (samples.length - 1)) * w;
        const y = h - (s.stress / 100) * h;
        return `${x},${y}`;
    });
    const areaPoints = points.join(' ') + ` ${w},${h} 0,${h}`;
    const avg = Math.round(samples.reduce((a, s) => a + s.stress, 0) / samples.length);
    const max = Math.max(...samples.map(s => s.stress));
    const peakSample = samples.find(s => s.stress === max);
    const peakTime = peakSample ? peakSample.time : '';

    // Time labels for x-axis
    const firstTime = samples[0].time;
    const lastTime = samples[samples.length - 1].time;
    const midIdx = Math.floor(samples.length / 2);
    const midTime = samples[midIdx].time;

    return `<div class="stress-chart">
        <div class="sz sz-high"></div><div class="sz sz-mod"></div><div class="sz sz-low"></div>
        <svg class="stress-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            <defs><linearGradient id="stressGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--thread-med)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--thread-med)" stop-opacity="0"/></linearGradient></defs>
            <polyline class="stress-area" points="${areaPoints}"/>
            <polyline class="stress-line" points="${points.join(' ')}"/>
        </svg>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.55rem;color:var(--thread-faded);margin-bottom:8px;padding:0 4px">
        <span>${firstTime}</span><span>${midTime}</span><span>${lastTime}</span>
    </div>
    <div class="stress-stats">
        <div><div class="ss-val">${avg}</div><div class="ss-lbl">Average</div></div>
        <div><div class="ss-val">${max}</div><div class="ss-lbl">Peak</div></div>
        <div><div class="ss-val">${peakTime}</div><div class="ss-lbl">Peak time</div></div>
    </div>`;
}

function buildEveningEnergy(d) {
    // Calculate evening energy from stress data during 18:00-21:00
    // Use yesterday's stress data and today's if available
    const stressYesterday = (d.stress_yesterday || {}).samples || [];
    const stressToday = (d.stress_today || {}).samples || [];
    const radar = d.radar || [];

    function eveningScore(samples) {
        // Filter samples between 18:00 and 21:00
        const evening = samples.filter(s => {
            const h = parseInt(s.time.split(':')[0]);
            return h >= 18 && h < 21;
        });
        if (evening.length === 0) return null;
        const avg = evening.reduce((a, s) => a + s.stress, 0) / evening.length;
        // Convert: low stress = good energy, high stress = depleted
        // 0 stress = 100% energy, 100 stress = 0% energy
        return Math.max(0, Math.round(100 - avg));
    }

    const days = [];
    for (let i = 6; i >= 0; i--) {
        const dt = new Date();
        dt.setDate(dt.getDate() - i);
        const dayName = dt.toLocaleDateString('en', {weekday: 'short'});
        const isToday = i === 0;
        const isYesterday = i === 1;

        let score = null;
        let note = '';
        if (isToday) {
            score = eveningScore(stressToday);
            note = score !== null ? 'today' : 'not yet';
        } else if (isYesterday) {
            score = eveningScore(stressYesterday);
            note = score !== null ? (score > 70 ? 'good' : score > 40 ? 'moderate' : 'depleted') : '—';
        } else {
            note = '—';
        }

        let barClass = 'ef-ok';
        if (score !== null) {
            barClass = score > 70 ? 'ef-good' : (score > 40 ? 'ef-mod' : 'ef-dep');
        }

        days.push(`<div class="ev-row"><div class="ev-day">${dayName}</div><div class="ev-track">${score !== null ? `<div class="ev-fill ${barClass}" style="width:${score}%"></div>` : ''}</div><div class="ev-note">${note}</div></div>`);
    }

    return days.join('');
}

function render(d) {
    const c = d.coaching || {};
    const s = d.sleep || {};
    const daily = d.daily || {};
    const dep = d.depletion || {};
    const radar = d.radar || [];
    const today = radar[0] || {};
    const sh = d.sleep_history || {};
    const steps = d.steps || {};

    const totalMin = s.total_minutes || 0;
    const deepPct = totalMin ? Math.round((s.deep_sleep_minutes||0)/totalMin*100) : 0;
    const remPct = totalMin ? Math.round((s.rem_sleep_minutes||0)/totalMin*100) : 0;
    const lightPct = totalMin ? Math.round((s.light_sleep_minutes||0)/totalMin*100) : 0;
    const totalH = s.total_hours || 0;
    const totalWithNaps = s.total_with_naps_hours || totalH;
    const napsToday = s.naps_today || [];
    const napTotalH = napsToday.reduce((a, n) => a + (n.duration_hours || 0), 0);
    const sleepBadge = totalH >= 7 ? 'good' : (totalH >= 6 ? 'fair' : 'poor');
    const sleepBadgeText = totalH >= 7 ? 'Good' : (totalH >= 6 ? 'Fair' : 'Short');
    const sleepDebt = s.sleep_debt_hours !== undefined ? s.sleep_debt_hours : (totalH ? Math.round((totalH - 7) * 10) / 10 : 0);

    const stepTotal = steps.total_steps || 0;
    const stepPct = Math.min(stepTotal / 6000, 1);
    const stepOffset = 251 - (251 * stepPct);

    // Sleep trend — time-positioned bars showing WHEN sleep happened
    const sessions = (sh.sessions || []).slice(-7);
    const sleepTrendHTML = buildSleepTrend(sessions);

    // Depletion indicators
    const bodyIndicators = (dep.indicators||[]).filter(i => !i.source);
    const mindIndicators = (dep.indicators||[]).filter(i => i.source === 'check-in');
    const depOverall = dep.overall || 'green';
    const depStatusClass = `status-${depOverall}`;
    const depDotClass = depOverall === 'green' ? 'dot-g' : (depOverall === 'yellow' ? 'dot-y' : 'dot-r');

    const ts = d.timestamps || {};

    const INFO_TOOLTIPS = {
        'Sleep': {title:'Sleep Duration', desc:'Total hours slept last night. Measured by your smart band via movement and heart rate patterns. Note: the band can mistake quiet wakefulness for light sleep — if you felt awake, trust that feeling.', healthy:'7-9 hours', source:'Smart band (Gadgetbridge)', updated: ts.sleep},
        'Stress': {title:'Stress Level', desc:'Calculated from heart rate variability (HRV) by your smart band. Lower HRV = higher stress. Measured continuously 24/7. ' + (ts.stress_note || ''), healthy:'Below 40 average', source:'Smart band (Gadgetbridge)', updated: 'Last synced reading: ' + (ts.stress || 'unknown')},
        'Movement': {title:'Daily Steps', desc:'Steps since midnight today from your smart band accelerometer. Resets at midnight. Low movement correlates with lower energy and mood.', healthy:'5,000-8,000 steps', source:'Smart band (Gadgetbridge)', updated: ts.steps},
        'Energy': {title:'Self-Reported Energy', desc:'How energized you feel, from your daily check-in. Compare this to body signals to spot mind-body gaps.', healthy:'3-5 is functional', source:'Daily check-in (/checkin)', updated: ts.radar},
        'People': {title:'People Energy', desc:'How interactions with others feel today. "Draining" or "avoiding" for 2+ days is an early collapse warning.', healthy:'Neutral or energizing', source:'Daily check-in (/checkin)', updated: ts.radar},
        'Middle gear': {title:'Middle Gear Available', desc:'Can you take it lighter today? Tracks whether you have a gear between 100% and 0%. Consistently saying "no" reveals a belief pattern — the idea that you must always be at full capacity — not a scheduling problem.', healthy:'"Yes" most days', source:'Daily check-in (/checkin)', updated: ts.radar},
    };

    function indicatorHTML(ind, icon) {
        const dc = ind.status === 'green' ? 'dot-g' : (ind.status === 'yellow' ? 'dot-y' : 'dot-r');
        const trendText = ind.trend === 'stable' ? '&rarr; stable' : (ind.trend === 'low' ? '&darr; low' : '&uarr;');
        const src = ind.source ? ` &middot; from check-in` : '';
        const tip = INFO_TOOLTIPS[ind.name] || {};
        const tooltipHTML = tip.title ? `<span class="info-tooltip"><div class="info-tooltip-title">${tip.title}</div>${tip.desc}<div class="info-tooltip-meta">Healthy range: ${tip.healthy}<br>Source: ${tip.source}<br>Last updated: ${tip.updated || 'unknown'}</div></span>` : '';
        return `<div class="radar-item"><div class="ri-icon">${icon}</div><div class="ri-info"><div class="ri-name">${ind.name} <span class="info-icon">i${tooltipHTML}</span></div><div class="ri-sub">${trendText}${src}</div></div><div class="ri-right"><div class="ri-val">${ind.value}</div><div class="ri-dot ${dc}"></div></div></div>`;
    }

    // Weather days
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const weatherHTML = Array.from({length:7}, (_,i) => {
        const dt = new Date(); dt.setDate(dt.getDate() - (6-i));
        const dayName = dayNames[dt.getDay()];
        const dateStr = dt.toISOString().split('T')[0];
        const entry = radar.find(r => r.date === dateStr);
        const feeling = entry ? entry.feeling : null;
        const cls = feeling ? (feeling.includes('calm')?'w-calm':feeling.includes('focus')?'w-focused':feeling.includes('tired')?'w-tired':feeling.includes('anxi')?'w-anxious':'w-tired') : 'w-blank';
        return `<div class="weather-day"><div class="wd-lbl">${dayName}</div><div class="wd-word ${cls}">${feeling||'&mdash;'}</div></div>`;
    }).join('');

    const namedCount = radar.filter(r=>r.feeling && r.feeling !== '?').length;
    const unknownCount = radar.filter(r=>r.feeling === '?').length;
    const missingCount = 7 - radar.length;
    const clarityNamed = Math.round(namedCount/7*100);
    const clarityUnknown = Math.round(unknownCount/7*100);

    const drains = radar.map(r=>r.drain).filter(Boolean).join(', ') || 'none reported';
    const recharges = radar.map(r=>r.recharge).filter(Boolean).join(', ') || 'none reported';

    document.getElementById('date-stamp').textContent = d.date || '';

    document.getElementById('content').innerHTML = `
    <section class="hero">
        <div class="orb-box"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
        <div class="pulse-label">Today's Pulse</div>
        <h1 class="pulse-phrase stitched">${c.hero_phrase || 'Check in with yourself.'}</h1>
    </section>

    ${(() => {
        const prevSessions = (sh.sessions || []).filter(s => !s.is_nap);
        const prevSleep = prevSessions.length > 1 ? prevSessions[prevSessions.length - 2].total_hours || 0 : null;
        const prevRadar = radar.length > 1 ? radar[1] : null;
        const prevEnergy = prevRadar ? prevRadar.energy : null;
        const dh2 = (d.daily_history || {}).days || [];
        const prevSteps = dh2.length > 1 ? dh2[dh2.length - 2].steps || 0 : null;
        const ws = d.weekly_summary || {};
        const weekDebt = ws.weekly_debt_with_naps !== undefined ? ws.weekly_debt_with_naps : sleepDebt;

        function trendArrow(current, previous) {
            if (previous === null || previous === undefined) return '';
            const diff = current - previous;
            if (Math.abs(diff) < 0.1) return '<div class="metric-trend metric-trend-same">&rarr;</div>';
            return diff > 0
                ? '<div class="metric-trend metric-trend-up">&#x25B2; vs yesterday</div>'
                : '<div class="metric-trend metric-trend-down">&#x25BC; vs yesterday</div>';
        }

        const hasNap = napsToday.length > 0;

        return `<div class="metrics-row">
        <div class="metric-item"><div class="metric-val stitched">${Math.floor(totalH)}<span class="metric-unit">h</span> ${Math.round((totalH%1)*60)}<span class="metric-unit">m</span></div><div class="metric-label">Night</div>${trendArrow(totalH, prevSleep)}</div>
        ${hasNap ? `<div class="metric-item"><div class="metric-val stitched">${napTotalH}<span class="metric-unit">h</span></div><div class="metric-label">Nap</div></div>` : ''}
        <div class="metric-item"><div class="metric-val stitched">${today.energy||'—'}<span class="metric-unit">/5</span></div><div class="metric-label">Energy</div>${trendArrow(today.energy, prevEnergy)}</div>
        <div class="metric-item"><div class="metric-val stitched">${weekDebt>0?'+':''}${weekDebt}<span class="metric-unit">h</span></div><div class="metric-label">Week Debt</div></div>
        <div class="metric-item"><div class="metric-val stitched">${stepTotal.toLocaleString()}</div><div class="metric-label">Steps</div>${trendArrow(stepTotal, prevSteps)}</div>
    </div>`;
    })()}

    <div class="advice-block"><p class="advice-text">${c.hero_advice || ''}</p></div>

    ${c.mind_body_gap ? `<div class="gap-alert"><div class="gap-title">Mind-Body Gap</div><div class="gap-text">${c.mind_body_gap}</div></div>` : ''}

    <hr class="section-sep">

    <div class="card-row">
        <div class="card">
            <div class="card-title">Last Night's Sleep <span class="info-icon">i<span class="info-tooltip"><div class="info-tooltip-title">Sleep Data</div>Measured by your smart band via movement and heart rate. The band can mistake quiet rest for light sleep — if you felt awake, trust your feeling.<div class="info-tooltip-meta">Source: Smart band (Gadgetbridge)<br>Recording: ${ts.sleep || 'unknown'}</div></span></span></div>
            <div class="sleep-times">
                <div class="sleep-time-block"><div class="sleep-time-label">Bed</div><div class="sleep-time-val">${(s.date||'').split(' ')[1]||'—'}</div></div>
                <div class="sleep-arrow">&rarr;</div>
                <div class="sleep-time-block"><div class="sleep-time-label">Wake</div><div class="sleep-time-val">${(s.wakeup_time||'').split(' ')[1]||'—'}</div></div>
            </div>
            <div class="sleep-total"><span class="sleep-total-val">${Math.floor(totalH)}h ${Math.round((totalH%1)*60)}min</span><span class="sleep-badge badge-${sleepBadge}">${sleepBadgeText}</span></div>
            <div class="sleep-bar">
                <div class="sleep-seg seg-deep" style="flex:${s.deep_sleep_hours||0}">${s.deep_sleep_hours||0}h</div>
                <div class="sleep-seg seg-light" style="flex:${s.light_sleep_hours||0}">${s.light_sleep_hours||0}h</div>
                <div class="sleep-seg seg-rem" style="flex:${s.rem_sleep_hours||0}">${s.rem_sleep_hours||0}h</div>
            </div>
            <div class="stage-list">
                <div class="stage"><div class="stage-dot" style="background:var(--color-deep)"></div><div class="stage-name">Deep</div><div class="stage-val">${s.deep_sleep_hours||0}h</div><div class="stage-pct">${deepPct}%</div><div class="stage-bench ${deepPct>25?'stage-above':'stage-good'}">${deepPct>25?'&#x25B2;':'&#x2713;'} 15-25%</div></div>
                <div class="stage"><div class="stage-dot" style="background:var(--color-light)"></div><div class="stage-name">Light</div><div class="stage-val">${s.light_sleep_hours||0}h</div><div class="stage-pct">${lightPct}%</div><div class="stage-bench stage-good">&#x2713; 40-60%</div></div>
                <div class="stage"><div class="stage-dot" style="background:var(--color-rem)"></div><div class="stage-name">REM</div><div class="stage-val">${s.rem_sleep_hours||0}h</div><div class="stage-pct">${remPct}%</div><div class="stage-bench ${remPct>25?'stage-above':'stage-good'}">${remPct>25?'&#x25B2;':'&#x2713;'} 20-25%</div></div>
                <div class="stage"><div class="stage-dot" style="background:var(--color-awake)"></div><div class="stage-name">Awake</div><div class="stage-val">${s.awake_minutes||0}m</div><div class="stage-pct"></div><div class="stage-bench stage-good">&#x2713; &lt;30m</div></div>
            </div>
            <div class="coach-box"><div class="coach-text">${c.sleep_coach||''}</div></div>
            ${napsToday.length > 0 ? napsToday.map(n => {
                const nStart = n.start ? n.start.split(' ')[1] : '?';
                const nEnd = n.end ? n.end.split(' ')[1] : '?';
                const nH = n.duration_hours || 0;
                // We don't have per-nap stage data from the API yet, so show duration only
                return `<div style="margin-top:12px;padding:14px;background:rgba(255,255,255,.06);border-radius:8px;border-left:3px solid var(--thread-light)">
                    <div style="font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--thread-faded);margin-bottom:8px">Today's Nap</div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                        <div><span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:600">${nStart}</span> <span style="color:var(--thread-faded)">&rarr;</span> <span style="font-family:var(--font-serif);font-size:1.1rem;font-weight:600">${nEnd}</span></div>
                        <div style="font-family:var(--font-serif);font-size:1rem;font-style:italic">${nH}h</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--thread-faded);margin-bottom:10px">
                        <span>Total recovery today: <strong style="color:var(--thread-dark)">${totalWithNaps}h</strong></span>
                        <span>Sleep debt: <strong style="color:${sleepDebt >= 0 ? 'var(--green)' : 'var(--amber)'}">${sleepDebt > 0 ? '+' : ''}${sleepDebt}h</strong></span>
                    </div>
                    ${c.nap_coach ? `<div class="coach-box"><div class="coach-text">${c.nap_coach}</div></div>` : ''}
                </div>`;
            }).join('') : ''}
        </div>
        <div class="card">
            <div class="card-title">Sleep Trend &middot; ${sessions.length} nights</div>
            ${sleepTrendHTML}
        </div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Depletion Radar</div>
        <div class="radar-status ${depStatusClass}"><div class="status-dot ${depDotClass}"></div><div class="status-text">${depOverall==='green'?'All stable':'Watch your signals'}</div></div>
        <div class="radar-group">Body signals</div>
        <div class="radar-list">
            ${indicatorHTML(bodyIndicators[0]||{name:'Sleep',value:'—',status:'green',trend:'stable'}, SVG_ICONS.moon)}
            ${indicatorHTML(bodyIndicators[1]||{name:'Stress',value:'—',status:'green',trend:'stable'}, SVG_ICONS.face)}
            ${indicatorHTML(bodyIndicators[2]||{name:'Movement',value:'—',status:'green',trend:'stable'}, SVG_ICONS.bolt)}
        </div>
        <div class="radar-group">Mind signals</div>
        <div class="radar-list">
            ${indicatorHTML(mindIndicators[0]||{name:'Energy',value:'—',status:'green',trend:'stable',source:'check-in'}, SVG_ICONS.sun)}
            ${indicatorHTML(mindIndicators[1]||{name:'People',value:'—',status:'green',trend:'stable',source:'check-in'}, SVG_ICONS.people)}
            ${indicatorHTML(mindIndicators[2]||{name:'Middle gear',value:'—',status:'green',trend:'stable',source:'check-in'}, SVG_ICONS.compass)}
        </div>
        <div class="radar-explain">${c.depletion_watch||''}</div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Emotional Weather &middot; 7 days</div>
        <div class="weather-strip">${weatherHTML}</div>
        <div class="clarity-row">
            <div class="clarity-label">Emotional clarity: ${clarityNamed}% named &middot; ${clarityUnknown}% unnamed</div>
            <div class="clarity-bar"><div class="cl-named" style="flex:${clarityNamed}"></div><div class="cl-unknown" style="flex:${clarityUnknown}"></div><div class="cl-missing" style="flex:${100-clarityNamed-clarityUnknown}"></div></div>
        </div>
        <div class="dr-grid">
            <div><div class="dr-title">Drains</div><div class="dr-text">${drains}</div></div>
            <div><div class="dr-title">Recharges</div><div class="dr-text">${recharges}</div></div>
        </div>
        <div class="coach-box"><div class="coach-text">${c.weather_insight||''}</div></div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Stress &amp; Recovery &middot; Today <span class="info-icon">i<span class="info-tooltip"><div class="info-tooltip-title">Stress Data</div>Calculated from heart rate variability by your smart band. Measured continuously 24/7. ${ts.stress_note || ''}<div class="info-tooltip-meta">Source: Smart band (Gadgetbridge)<br>Last synced reading: ${ts.stress || 'unknown'}</div></span></span></div>
        ${buildStressChart(d.stress_today)}
        <div class="szl"><span><span class="szl-dot" style="background:var(--green)"></span>Relaxed 0-29</span><span><span class="szl-dot" style="background:var(--amber)"></span>Moderate 30-59</span><span><span class="szl-dot" style="background:var(--rose)"></span>High 60+</span></div>
        <div class="coach-box"><div class="coach-text">${c.stress_coach||''}</div></div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Movement <span class="info-icon">i<span class="info-tooltip"><div class="info-tooltip-title">Step Data</div>Steps counted by your smart band's accelerometer.<div class="info-tooltip-meta">Source: Smart band (Gadgetbridge)<br>Last updated: ${ts.daily || 'unknown'}</div></span></span></div>
        <div class="move-top">
            <div class="move-ring">
                <svg viewBox="0 0 100 100"><circle class="bg" cx="50" cy="50" r="40"/><circle class="fill" cx="50" cy="50" r="40" stroke-dasharray="251" stroke-dashoffset="${stepOffset}"/></svg>
                <div class="move-count"><div class="move-num">${stepTotal}</div><div class="move-lbl">steps</div></div>
            </div>
            <div class="move-info">
                <div class="move-target">Target: 6,000 steps</div>
            </div>
        </div>
        ${stepTotal < 2000 ? `<div class="move-alert move-alert-urgent">${c.movement_coach||'Your body wants to move.'}</div>` : `<div class="coach-box"><div class="coach-text">${c.movement_coach||''}</div></div>`}
        <div class="move-bench">Healthy range: 5,000&ndash;8,000 steps/day</div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Evening Energy &middot; 18:00&ndash;21:00 <span class="info-icon">i<span class="info-tooltip"><div class="info-tooltip-title">Evening Energy</div>Measures how depleted you are during kid time (18:00-21:00). Will combine band stress/HR data with check-in data.<div class="info-tooltip-meta">Source: Coming soon — currently sample data<br>Last updated: placeholder</div></span></span></div>
        <div class="ev-subtitle">"Are you present or running on empty?"</div>
        ${buildEveningEnergy(d)}
        <div class="ev-pattern">${c.evening_pattern||''}</div>
    </div>

    <hr class="section-sep">

    <div class="card">
        <div class="card-title">Weekly Insight</div>
        <div class="insight-quote">${c.weekly_quote||''}</div>

        <div class="trends-list">
            ${buildTrendRows(d)}
        </div>

        <div class="coach-box"><div class="coach-text">${c.weekly_action||''}</div></div>
    </div>
    <div style="height:16px"></div>
    `;
}

loadDashboard();

// Pull-to-refresh
let touchStartY = 0;
let pulling = false;
document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchmove', e => {
    if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 60 && !pulling) {
        pulling = true;
        document.getElementById('ptr').style.display = 'block';
    }
}, {passive: true});
document.addEventListener('touchend', () => {
    if (pulling) {
        pulling = false;
        document.getElementById('ptr').style.display = 'none';
        document.getElementById('content').innerHTML = '<div class="loading"><div class="loading-orb"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>Refreshing<span class="loading-dots"></span></div>';
        loadDashboard();
    }
});
</script>
</body>
</html>
