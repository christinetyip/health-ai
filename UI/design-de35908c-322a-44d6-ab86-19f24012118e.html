<html lang="en" vid="0"><head vid="1">
<meta charset="UTF-8" vid="2">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
<title vid="4">Prairie Health - Evening Check-in</title>
<style vid="5">
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');

    :root {
        --fabric-base: #C9AB8D;
        --fabric-light: #D5B99D;
        --fabric-dark: #B59577;
        --thread-dark: #5C261A;   
        --thread-med: #8B4330;    
        --thread-light: #AD5A43;  
        --thread-faded: rgba(92, 38, 26, 0.6);
        --seam: rgba(92, 38, 26, 0.15); 
        --seam-light: rgba(255, 255, 255, 0.2);
        --font-serif: 'Cormorant Garamond', 'Georgia', serif;
        --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: var(--fabric-base);
        color: var(--thread-dark);
        font-family: var(--font-sans);
        line-height: 1.5;
        background-image: 
            linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px),
            linear-gradient(0deg, rgba(255,255,255,0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px),
            linear-gradient(0deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        background-size: 4px 4px, 4px 4px, 3px 3px, 3px 3px;
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        z-index: 999;
        opacity: 0.4;
        background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        mix-blend-mode: overlay;
    }

    .app-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 24px 20px 100px;
    }

    .stitched-text {
        text-shadow: 0.5px 0.5px 0px rgba(255,255,255,0.3), -0.5px -0.5px 0px rgba(0,0,0,0.1);
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
        padding-bottom: 16px;
        border-bottom: 1px dashed var(--seam);
    }

    .close-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
    }

    .screen-title {
        font-family: var(--font-serif);
        font-size: 2.2rem;
        font-weight: 400;
        text-align: center;
        margin-bottom: 40px;
        color: var(--thread-dark);
        font-style: italic;
    }

    .input-group {
        margin-bottom: 48px;
    }

    .label-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 24px;
    }

    .input-label {
        font-family: var(--font-sans);
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--thread-faded);
    }

    .input-value-desc {
        font-family: var(--font-serif);
        font-size: 1.1rem;
        font-style: italic;
        color: var(--thread-med);
    }

    
    .slider-track {
        height: 2px;
        width: 100%;
        background-image: linear-gradient(to right, var(--thread-med) 50%, transparent 50%);
        background-size: 8px 2px;
        position: relative;
        margin: 20px 0;
    }

    .slider-thumb {
        position: absolute;
        top: 50%;
        left: 60%; 
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        background-color: var(--fabric-dark);
        border: 2px solid var(--thread-med);
        border-radius: 50%;
        box-shadow: 1px 2px 4px rgba(0,0,0,0.1);
    }

    .slider-thumb::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: var(--thread-med);
    }

    
    .toggle-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    .stitched-toggle {
        padding: 12px;
        text-align: center;
        border: 1px dashed var(--seam);
        border-radius: 8px;
        font-family: var(--font-serif);
        font-size: 1rem;
        color: var(--thread-dark);
        cursor: pointer;
        transition: all 0.2s ease;
        background-color: rgba(255,255,255,0.05);
    }

    .stitched-toggle.active {
        background-color: var(--fabric-dark);
        border-style: solid;
        border-color: var(--thread-med);
        box-shadow: inset 1px 1px 3px rgba(0,0,0,0.1);
        font-weight: 600;
    }

    .save-button {
        width: 100%;
        padding: 20px;
        background-color: var(--thread-dark);
        color: var(--fabric-light);
        border: none;
        border-radius: 12px;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-top: 20px;
        box-shadow: 0 4px 10px rgba(92, 38, 26, 0.2);
    }

    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background-color: var(--fabric-base);
        border-top: 1px dashed var(--seam);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 100;
        background-image: linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(0deg, rgba(255,255,255,0.07) 1px, transparent 1px);
        background-size: 4px 4px;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        opacity: 0.5;
        text-decoration: none;
    }

    .nav-icon {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: var(--thread-dark);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .nav-label {
        font-family: var(--font-sans);
        font-size: 0.65rem;
        color: var(--thread-dark);
        letter-spacing: 0.05em;
    }
</style>
</head>
<body vid="6">

<div class="app-container" vid="7">
    <header vid="8">
        <button class="close-btn" vid="9">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--thread-dark)" stroke-width="1.5" vid="10">
                <path d="M18 6L6 18M6 6l12 12" vid="11"></path>
            </svg>
        </button>
        <div class="date-stamp" vid="12">Evening Check-In</div>
        <div style="width: 24px" vid="13"></div>
    </header>

    <h1 class="screen-title stitched-text" vid="14">How was your thread today?</h1>

    
    <div class="input-group" vid="15">
        <div class="label-row" vid="16">
            <span class="input-label" vid="17">Stress Level</span>
            <span class="input-value-desc" vid="18">Noticeable</span>
        </div>
        <div class="slider-track" vid="19">
            <div class="slider-thumb" style="left: 65%;" vid="20"></div>
        </div>
    </div>

    
    <div class="input-group" vid="21">
        <div class="label-row" vid="22">
            <span class="input-label" vid="23">Energy Remaining</span>
            <span class="input-value-desc" vid="24">Quiet &amp; Low</span>
        </div>
        <div class="slider-track" vid="25">
            <div class="slider-thumb" style="left: 30%;" vid="26"></div>
        </div>
    </div>

    
    <div class="input-group" vid="27">
        <div class="label-row" vid="28">
            <span class="input-label" vid="29">Overall Mood</span>
        </div>
        <div class="toggle-grid" vid="30">
            <div class="stitched-toggle" vid="31">Content</div>
            <div class="stitched-toggle active" vid="32">Pensive</div>
            <div class="stitched-toggle" vid="33">Anxious</div>
            <div class="stitched-toggle" vid="34">Restless</div>
            <div class="stitched-toggle" vid="35">Calm</div>
            <div class="stitched-toggle" vid="36">Heavy</div>
        </div>
    </div>

    <button class="save-button stitched-text" vid="37">Bind for Today</button>
</div>

<nav class="bottom-nav" vid="38">
    <a href="#" class="nav-item" vid="39">
        <svg class="nav-icon" viewBox="0 0 24 24" vid="40">
            <circle cx="12" cy="12" r="4" vid="41"></circle>

        </svg>
        <span class="nav-label" vid="43">Today</span>
    </a>
    <a href="#" class="nav-item" vid="44">
        <svg class="nav-icon" viewBox="0 0 24 24" vid="45">
            <path d="M3 3v18h18" vid="46"></path>
            <path d="M18 9l-5 5-4-4-5 5" vid="47"></path>
        </svg>
        <span class="nav-label" vid="48">Trends</span>
    </a>
    <a href="#" class="nav-item" vid="49">
        <svg class="nav-icon" viewBox="0 0 24 24" vid="50">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" vid="51"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" vid="52"></path>
        </svg>
        <span class="nav-label" vid="53">Insights</span>
    </a>
</nav>

</body></html>
